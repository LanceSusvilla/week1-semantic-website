<main>

<section>

<h2>Send Us a Message</h2>

<form>

<label for="name">Full Name</label><br>

<input
type="text"
id="name"
name="name"
required>

<br><br>

<label for="email">Email Address</label><br>

<input
type="email"
id="email"
name="email"
required>

<br><br>

<label for="phone">Phone Number</label><br>

<input
type="tel"
id="phone"
name="phone">

<br><br>

<label for="message">Message</label><br>

<textarea
id="message"
name="message"
rows="5"
required></textarea>

<br><br>

<button type="submit">Send Message</button>

</form>

</section>
